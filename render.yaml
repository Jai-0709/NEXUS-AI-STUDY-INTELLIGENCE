services:
  - type: web
    name: nexus-ai-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: NEXUS_API_KEY
        sync: false
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.9"
